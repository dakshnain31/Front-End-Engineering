<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact – Arman's Tech Blog</title>


<script src="script.js" defer></script>
<style>
:root {
  --bg: #f4f7fb;
  --card: #ffffff;
  --muted: #6b7280;
  --text: #0f1724;
  --primary: #4c6ef5;
  --accent: #22c55e;
  --radius: 12px;
  --shadow: 0 8px 24px rgba(16,24,40,0.08);
  --max-width: 900px;
}
[data-theme="dark"] {
  --bg: #0b1220;
  --card: #0f1724;
  --muted: #9aa4b2;
  --text: #e6eef6;
  --primary: #6b8cff;
  --shadow: 0 8px 30px rgba(2,6,23,0.7);
}

*,
*::before,
*::after {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

body {
  font-family: Inter, ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial;
  background: var(--bg);
  color: var(--text);
  line-height: 1.6;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}

/* Header */
header {
  background: linear-gradient(135deg,var(--primary),#3753d6);
  color: white;
  padding: 30px 20px;
  text-align: center;
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  margin: 20px;
}
header h1 {
  font-size: 2rem;
}

/* Navigation */
nav {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: 6px;
  margin: 20px;
}
nav a {
  padding: 10px 14px;
  border-radius: 10px;
  font-weight: 600;
  transition: background .3s, color .3s;
}
nav a:hover, nav a.active {
  background: rgba(76,110,245,0.1);
  color: var(--primary);
}

/* Main container */
.container {
  max-width: var(--max-width);
  margin: auto;
  padding: 40px 20px;
}

/* Section heading */
.container h1 {
  font-size: 1.8rem;
  margin-bottom: 20px;
  text-align: center;
  color: var(--text);
}
.container p {
  line-height: 1.7;
  color: var(--muted);
  text-align: center;
  margin-bottom: 30px;
}

/* Contact form */
form {
  background: var(--card);
  padding: 30px;
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  max-width: 600px;
  margin: auto;
  transition: transform .3s, box-shadow .3s;
}
form:hover {
  transform: translateY(-4px);
  box-shadow: 0 12px 28px rgba(16,24,40,0.12);
}

label {
  display: block;
  font-weight: 600;
  margin-top: 12px;
  margin-bottom: 6px;
  color: var(--text);
}
input, textarea {
  width: 100%;
  padding: 12px 14px;
  border: 1px solid #e2e8f0;
  border-radius: 10px;
  font-size: 16px;
  color: var(--text);
  background: #fefefe;
  transition: border .3s, box-shadow .3s;
}
input:focus, textarea:focus {
  outline: none;
  border-color: var(--primary);
  box-shadow: 0 0 6px rgba(76,110,245,0.2);
}

button {
  padding: 12px 20px;
  background: var(--primary);
  color: white;
  border: none;
  cursor: pointer;
  border-radius: var(--radius);
  font-size: 16px;
  font-weight: 600;
  transition: background .3s, transform .2s;
}
button:hover {
  background: #3753d6;
  transform: translateY(-2px);
}

/* Footer */
footer {
  text-align: center;
  padding: 20px 0;
  color: var(--muted);
  margin-top: 40px;
}

/* Responsive */
@media (max-width:720px){
  header h1 {
    font-size: 1.5rem;
  }
  .container {
    padding: 30px 14px;
  }
  nav {
    flex-direction: column;
  }
  nav a {
    width: 100%;
    text-align: center;
  }
}
</style>
</head>
<body>

<header>
    <h1>Contact Me</h1>
</header>

<nav>
    <a href="index.html">Home</a>
    <a href="about.html">About</a>
    <a class="active" href="contact.html">Contact</a>
    <a href="webdev.html">Web Dev</a>
    <a href="ai.html">AI & ML</a>
    <a href="technew.html">Tech News</a>
    <a href="programming.html">Programming</a>
    <a href="gadgets.html">Gadgets</a>
</nav>

<div class="container">
  <img src="https://images.unsplash.com/photo-1596524430615-b46475ddff6e?auto=format&fit=crop&w=800&q=80" style="width:100%; height:200px; object-fit:cover; border-radius:12px;" alt="Contact">
    <h1>Get in Touch</h1>
    <p>
        Have a question, suggestion, or want to collaborate?  
        Fill out the form below — I usually reply within 24–48 hours.
    </p>

    <form>
        <label for="name">Name:</label>
        <input id="name" type="text" placeholder="Enter your name">

        <label for="email">Email:</label>
        <input id="email" type="email" placeholder="Enter your email">

        <label for="message">Message:</label>
        <textarea id="message" rows="5" placeholder="Write your message..."></textarea>

        <button type="submit">Send Message</button>
    </form>
</div>

<footer>
    <p>&copy; 2026 Daksh’s Tech Blog</p>
</footer>

<script>
    const form = document.querySelector('form');
    form?.addEventListener('submit', (e) => {
        e.preventDefault();
        form.innerHTML = `<div class="reveal is-visible">
            <h2>Message Sent!</h2>
            <p>Thanks for reaching out, Arman will get back to you soon.</p>
        </div>`;
    });
</script>

</body>
</html>
